<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수출입필증 관리</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; font-size: 13px; background: #f5f6f8; color: #1a1a2e; }
.page-container { max-width: 1800px; margin: 0 auto; padding: 20px 24px 80px; }
.breadcrumb { font-size: 12px; color: #9ca3af; margin-bottom: 6px; }
.breadcrumb a { color: #2563eb; text-decoration: none; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.page-title { font-size: 20px; font-weight: 700; color: #111827; }

.card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
.btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: background .15s; text-decoration: none; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-ghost { background: transparent; color: #6b7280; border: 1px solid #e5e7eb; }
.btn-ghost:hover { background: #f3f4f6; }
.btn-green { background: #16a34a; color: #fff; border: none; }
.btn-green:hover { background: #15803d; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

.section-header { display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-bottom: 1px solid #f0f0f0; }
.section-number { width: 22px; height: 22px; border-radius: 50%; background: #2563eb; color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.section-title { font-size: 14px; font-weight: 700; color: #111827; }
.section-subtitle { font-size: 12px; color: #9ca3af; }

.filter-row { display: flex; gap: 10px; padding: 12px 20px; align-items: flex-end; flex-wrap: wrap; }
.filter-row .fg { flex: 1; min-width: 120px; }
.filter-row .fg label { display: block; font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 3px; }
.form-input, .form-select { width: 100%; padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; color: #111827; background: #fff; outline: none; }
.form-input:focus, .form-select:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.1); }

.tbl-wrap { overflow-x: auto; }
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
.tbl th { background: #f8f9fb; color: #6b7280; font-weight: 600; padding: 7px 10px; text-align: center; border-bottom: 1px solid #e5e7eb; border-right: 1px solid #f0f0f0; }
.tbl td { padding: 7px 10px; border-bottom: 1px solid #f0f0f0; border-right: 1px solid #f0f0f0; vertical-align: middle; text-align: center; }
.tbl .th-group { font-size: 11px; padding: 4px 10px; font-weight: 700; }
.tbl tr:hover td { background: #f9fafb; }
.empty-row td { color: #9ca3af; padding: 40px; text-align: center; }

.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.b-done { background: #dcfce7; color: #15803d; }
.b-incomplete { background: #fee2e2; color: #b91c1c; }

.sum-strip { display: flex; align-items: center; gap: 18px; padding: 10px 20px; background: #f8f9fb; border-top: 1px solid #f0f0f0; border-radius: 0 0 8px 8px; flex-wrap: wrap; }
.sum-label { font-size: 12px; color: #6b7280; }
.sum-value { font-size: 13px; font-weight: 700; color: #111827; margin-left: 4px; }
.sum-divider { width: 1px; height: 16px; background: #e5e7eb; }

/* 모달 */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: #fff; border-radius: 12px; padding: 28px; width: 720px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.modal-title { font-size: 16px; font-weight: 700; color: #111827; }
.modal-close { background: none; border: none; font-size: 20px; color: #9ca3af; cursor: pointer; line-height: 1; }

.auto-info { background: #f0fdf4; border: 1px solid #86efac; border-radius: 6px; padding: 10px 16px; margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; font-size: 12px; }
.auto-info strong { color: #15803d; }

.msec { margin-bottom: 18px; }
.msec-title { font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #f0f0f0; }
.mgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.mgrid .span2 { grid-column: span 2; }
.mgrid .span3 { grid-column: span 3; }
.fg { display: flex; flex-direction: column; }
.fg label { font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 3px; }
.fg input, .fg select { padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; color: #111827; outline: none; background: #fff; }
.fg input:focus, .fg select:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
.fg input.ro { background: #f9fafb; color: #6b7280; cursor: default; }
</style>
</head>
<body>
<div class="page-container">
  <div class="breadcrumb"><a href="index.html">수출입통관 관리</a> &gt; <span>수출입필증 관리</span></div>
  <div class="page-header">
    <h1 class="page-title">수출입필증 관리</h1>
    <div style="display:flex;gap:8px;">
      <a href="index.html" class="btn btn-ghost btn-sm">← 통관 관리로</a>
      <button class="btn btn-ghost btn-sm" onclick="exportExcel()">↓ Excel 내보내기</button>
    </div>
  </div>

  <!-- 검색 -->
  <div class="card">
    <div class="section-header">
      <div class="section-number">1</div>
      <span class="section-title">검색 조건</span>
    </div>
    <div class="filter-row">
      <div class="fg"><label>TM Code</label><input id="f-tm" class="form-input" placeholder="TMCODE..."></div>
      <div class="fg"><label>신고번호</label><input id="f-decl" class="form-input" placeholder="12345-26-..."></div>
      <div class="fg"><label>고객사</label><input id="f-customer" class="form-input" placeholder="고객사"></div>
      <div class="fg"><label>신고일 (from)</label><input id="f-from" type="date" class="form-input"></div>
      <div class="fg"><label>신고일 (to)</label><input id="f-to" type="date" class="form-input"></div>
      <div class="fg">
        <label>입력상태</label>
        <select id="f-status" class="form-select">
          <option value="">전체</option>
          <option value="done">입력완료</option>
          <option value="incomplete">미입력</option>
        </select>
      </div>
      <div style="display:flex;gap:6px;align-items:flex-end;padding-bottom:1px;">
        <button class="btn btn-ghost btn-sm" onclick="resetFilters()">↺ 초기화</button>
        <button class="btn btn-primary btn-sm" onclick="render()">검색</button>
      </div>
    </div>
  </div>

  <!-- 목록 -->
  <div class="card">
    <div class="section-header">
      <div class="section-number">2</div>
      <span class="section-title">수출입필증 목록</span>
      <span id="result-count" class="section-subtitle" style="margin-left:4px;"></span>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th colspan="6" class="th-group" style="background:#eef2ff;color:#3730a3;">통관 기본 정보 (자동 연결)</th>
            <th colspan="8" class="th-group" style="background:#f0fdf4;color:#15803d;">수입필증 상세 정보</th>
            <th class="th-group" style="background:#fdf4ff;color:#7c3aed;">상태</th>
            <th class="th-group"></th>
          </tr>
          <tr>
            <th style="min-width:110px;">TM Code</th>
            <th style="min-width:120px;">과제명</th>
            <th style="min-width:80px;">고객사</th>
            <th style="min-width:150px;">신고번호</th>
            <th style="min-width:85px;">신고일</th>
            <th style="min-width:110px;">통관금액($)</th>
            <th style="min-width:130px;background:#f0fdf4;">수입 면장번호</th>
            <th style="min-width:90px;background:#f0fdf4;">세번부호</th>
            <th style="min-width:70px;background:#f0fdf4;">환율</th>
            <th style="min-width:110px;background:#f0fdf4;">과세가격(₩)</th>
            <th style="min-width:90px;background:#f0fdf4;">부가세(₩)</th>
            <th style="min-width:70px;background:#f0fdf4;">운임($)</th>
            <th style="min-width:70px;background:#f0fdf4;">보험료($)</th>
            <th style="min-width:80px;background:#f0fdf4;">징수형태</th>
            <th style="min-width:80px;background:#fdf4ff;">입력상태</th>
            <th style="min-width:60px;">편집</th>
          </tr>
        </thead>
        <tbody id="main-body"></tbody>
      </table>
    </div>
    <div class="sum-strip" id="sum-strip"></div>
  </div>
</div>

<!-- 상세 입력 모달 -->
<div id="detail-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">수입필증 상세 정보 입력</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="auto-info" id="modal-info"></div>

    <div class="msec">
      <div class="msec-title">기본 연결 정보 (자동)</div>
      <div class="mgrid">
        <div class="fg"><label>TM Code</label><input id="m-tm" class="ro" readonly></div>
        <div class="fg"><label>과제명</label><input id="m-proj" class="ro" readonly></div>
        <div class="fg"><label>고객사</label><input id="m-cust" class="ro" readonly></div>
        <div class="fg"><label>신고번호</label><input id="m-declno" class="ro" readonly></div>
        <div class="fg"><label>신고일</label><input id="m-decldate" class="ro" readonly></div>
        <div class="fg"><label>통관금액($)</label><input id="m-amt" class="ro" readonly></div>
      </div>
    </div>

    <div class="msec">
      <div class="msec-title">수입필증 정보</div>
      <div class="mgrid">
        <div class="fg"><label>수입 면장번호</label><input id="m-faceno" placeholder="면장번호 입력"></div>
        <div class="fg"><label>무역 Customer</label><input id="m-tradecustomer" placeholder="무역Customer"></div>
        <div class="fg">
          <label>징수형태</label>
          <select id="m-collectiontype">
            <option value="">선택</option>
            <option value="일반징수">일반징수</option>
            <option value="분납">분납</option>
            <option value="즉시납부">즉시납부</option>
          </select>
        </div>
        <div class="fg"><label>Customer (Manual)</label><input id="m-cust-manual" placeholder="Customer명"></div>
        <div class="fg"><label>ASICLAND PJT Name</label><input id="m-pjtname" placeholder="프로젝트명"></div>
        <div class="fg"><label>모델(규격)</label><input id="m-model" placeholder="모델/규격"></div>
      </div>
    </div>

    <div class="msec">
      <div class="msec-title">품목 정보</div>
      <div class="mgrid">
        <div class="fg"><label>세번부호</label><input id="m-hscode" placeholder="0000.00-0000"></div>
        <div class="fg"><label>수량</label><input id="m-qty" type="number" placeholder="수량"></div>
        <div class="fg"><label>단가(USD)</label><input id="m-unitprice" type="number" step="0.01" placeholder="단가"></div>
        <div class="fg"><label>금액(USD)</label><input id="m-amount" type="number" step="0.01" placeholder="금액"></div>
        <div class="fg"><label>운임($)</label><input id="m-freight" type="number" step="0.01" placeholder="0.00"></div>
        <div class="fg"><label>보험료($)</label><input id="m-insurance" type="number" step="0.01" placeholder="0.00"></div>
      </div>
    </div>

    <div class="msec">
      <div class="msec-title">과세 정보</div>
      <div class="mgrid">
        <div class="fg"><label>환율 (₩/$)</label><input id="m-exchange" type="number" step="0.01" placeholder="1380.00"></div>
        <div class="fg"><label>총과세가격($)</label><input id="m-totaltaxable" type="number" step="0.01" placeholder="과세가격 합계"></div>
        <div class="fg"><label>과세가격(₩)</label><input id="m-taxablekrw" type="number" step="1" placeholder="원화 과세가격"></div>
        <div class="fg"><label>부가세(₩)</label><input id="m-vat" type="number" step="1" placeholder="부가세"></div>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:16px;border-top:1px solid #f0f0f0;">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-green" onclick="saveDetail()">저장</button>
    </div>
  </div>
</div>

<script>
const KEY_CLEARANCES = 'customsClearances';
const KEY_DETAILS    = 'customsDeclarationDetails';

let currentDeclNo = null;
let allData = [];
let filtered = [];

const fmtUsd = n => '$' + Number(n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtKRW = n => n ? '₩' + Number(n).toLocaleString('ko-KR') : '—';
const dash   = v => v || '—';
const $      = id => document.getElementById(id);

function loadData(){
  const raw     = JSON.parse(localStorage.getItem(KEY_CLEARANCES) || '[]');
  const details = JSON.parse(localStorage.getItem(KEY_DETAILS)    || '{}');
  allData = raw.map(c => ({ ...c, detail: details[c.declNo] || null }));
}

function isComplete(d){
  return !!(d && d.faceNo && d.hsCode && d.exchangeRate && d.taxableKRW);
}

function render(){
  loadData();
  const fTm   = $('f-tm').value.trim().toLowerCase();
  const fDecl = $('f-decl').value.trim().toLowerCase();
  const fCust = $('f-customer').value.trim().toLowerCase();
  const fFrom = $('f-from').value;
  const fTo   = $('f-to').value;
  const fSt   = $('f-status').value;

  filtered = allData.filter(r => {
    if (fTm   && !r.tmCode.toLowerCase().includes(fTm))     return false;
    if (fDecl && !r.declNo.toLowerCase().includes(fDecl))   return false;
    if (fCust && !r.customer.toLowerCase().includes(fCust)) return false;
    if (fFrom && r.declDate < fFrom) return false;
    if (fTo   && r.declDate > fTo)   return false;
    if (fSt === 'done'       && !isComplete(r.detail)) return false;
    if (fSt === 'incomplete' &&  isComplete(r.detail)) return false;
    return true;
  });

  const tbody = $('main-body');
  if (!filtered.length){
    tbody.innerHTML = `<tr class="empty-row"><td colspan="100">수입필증 이력이 없습니다. <a href="index.html" style="color:#2563eb;">통관 관리</a>에서 통관완료를 등록하면 여기에 자동 연결됩니다.</td></tr>`;
    $('result-count').textContent = '';
    $('sum-strip').innerHTML = '';
    return;
  }

  let html = '';
  let totalAmt = 0;
  let doneCount = 0;

  filtered.forEach(r => {
    const d = r.detail || {};
    const complete = isComplete(r.detail);
    if (complete) doneCount++;
    totalAmt += (r.amt || 0);

    html += `<tr>
      <td><span style="background:#f5f3ff;color:#6d28d9;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700;font-family:monospace;">${r.tmCode}</span></td>
      <td style="font-weight:600;text-align:left;font-size:12px;">${r.project||'—'}</td>
      <td style="font-size:12px;">${r.customer||'—'}</td>
      <td style="font-family:monospace;font-size:11px;font-weight:700;color:#15803d;">${r.declNo}</td>
      <td style="font-size:12px;">${r.declDate}</td>
      <td style="font-weight:700;color:#1d4ed8;text-align:right;">${fmtUsd(r.amt)}</td>
      <td style="background:rgba(240,253,244,.4);font-family:monospace;font-size:11px;">${dash(d.faceNo)}</td>
      <td style="background:rgba(240,253,244,.4);font-size:11px;">${dash(d.hsCode)}</td>
      <td style="background:rgba(240,253,244,.4);text-align:right;">${d.exchangeRate ? Number(d.exchangeRate).toLocaleString('ko-KR') : '—'}</td>
      <td style="background:rgba(240,253,244,.4);text-align:right;font-weight:600;">${fmtKRW(d.taxableKRW)}</td>
      <td style="background:rgba(240,253,244,.4);text-align:right;">${fmtKRW(d.vat)}</td>
      <td style="background:rgba(240,253,244,.4);text-align:right;">${d.freight ? fmtUsd(d.freight) : '—'}</td>
      <td style="background:rgba(240,253,244,.4);text-align:right;">${d.insurance ? fmtUsd(d.insurance) : '—'}</td>
      <td style="background:rgba(240,253,244,.4);font-size:11px;">${dash(d.collectionType)}</td>
      <td style="background:rgba(253,244,255,.4);">
        <span class="badge ${complete ? 'b-done' : 'b-incomplete'}">${complete ? '입력완료' : '미입력'}</span>
      </td>
      <td><button class="btn btn-ghost btn-sm" onclick="openModal('${r.declNo}')">편집</button></td>
    </tr>`;
  });

  tbody.innerHTML = html;
  $('result-count').textContent = `— ${filtered.length}건 (완료 ${doneCount} / 미입력 ${filtered.length - doneCount})`;
  $('sum-strip').innerHTML = `
    <div class="sum-label">전체 <span class="sum-value">${filtered.length}건</span></div>
    <div class="sum-divider"></div>
    <div class="sum-label">통관금액 합계 <span class="sum-value" style="color:#1d4ed8;">${fmtUsd(totalAmt)}</span></div>
    <div class="sum-divider"></div>
    <div class="sum-label">입력완료 <span class="sum-value" style="color:#15803d;">${doneCount}건</span></div>
    <div class="sum-label">미입력 <span class="sum-value" style="color:#b91c1c;">${filtered.length - doneCount}건</span></div>
  `;
}

function openModal(declNo){
  currentDeclNo = declNo;
  const r = allData.find(x => x.declNo === declNo);
  if (!r) return;
  const d = r.detail || {};

  $('modal-info').innerHTML = `
    <span><strong>${r.tmCode}</strong></span>
    <span>${r.project||''}</span>
    <span>${r.customer||''}</span>
    <span>신고번호: <strong>${r.declNo}</strong></span>
    <span>신고일: <strong>${r.declDate}</strong></span>
    <span>통관금액: <strong>${fmtUsd(r.amt)}</strong></span>
  `;

  $('m-tm').value       = r.tmCode;
  $('m-proj').value     = r.project || '';
  $('m-cust').value     = r.customer || '';
  $('m-declno').value   = r.declNo;
  $('m-decldate').value = r.declDate;
  $('m-amt').value      = r.amt;

  $('m-faceno').value         = d.faceNo || '';
  $('m-tradecustomer').value  = d.tradeCustomer || '';
  $('m-collectiontype').value = d.collectionType || '';
  $('m-cust-manual').value    = d.customerManual || '';
  $('m-pjtname').value        = d.pjtName || '';
  $('m-model').value          = d.model || '';
  $('m-hscode').value         = d.hsCode || '';
  $('m-qty').value            = d.qty || '';
  $('m-unitprice').value      = d.unitPrice || '';
  $('m-amount').value         = d.amount || '';
  $('m-freight').value        = d.freight || '';
  $('m-insurance').value      = d.insurance || '';
  $('m-exchange').value       = d.exchangeRate || '';
  $('m-totaltaxable').value   = d.totalTaxable || '';
  $('m-taxablekrw').value     = d.taxableKRW || '';
  $('m-vat').value            = d.vat || '';

  $('detail-modal').classList.add('open');
}

function closeModal(){
  $('detail-modal').classList.remove('open');
  currentDeclNo = null;
}

function saveDetail(){
  if (!currentDeclNo) return;
  const details = JSON.parse(localStorage.getItem(KEY_DETAILS) || '{}');
  details[currentDeclNo] = {
    faceNo:         $('m-faceno').value.trim(),
    tradeCustomer:  $('m-tradecustomer').value.trim(),
    collectionType: $('m-collectiontype').value,
    customerManual: $('m-cust-manual').value.trim(),
    pjtName:        $('m-pjtname').value.trim(),
    model:          $('m-model').value.trim(),
    hsCode:         $('m-hscode').value.trim(),
    qty:            $('m-qty').value,
    unitPrice:      $('m-unitprice').value,
    amount:         $('m-amount').value,
    freight:        $('m-freight').value,
    insurance:      $('m-insurance').value,
    exchangeRate:   $('m-exchange').value,
    totalTaxable:   $('m-totaltaxable').value,
    taxableKRW:     $('m-taxablekrw').value,
    vat:            $('m-vat').value,
  };
  localStorage.setItem(KEY_DETAILS, JSON.stringify(details));
  closeModal();
  render();
}

function resetFilters(){
  ['f-tm','f-decl','f-customer','f-from','f-to'].forEach(id => $(id).value = '');
  $('f-status').value = '';
  render();
}

function exportExcel(){
  loadData();
  let csv = '﻿';
  csv += '"TM Code","과제명","고객사","신고번호","신고일","통관금액($)","수입 면장번호","무역Customer","징수형태","Customer","PJT Name","모델(규격)","세번부호","수량","단가(USD)","금액(USD)","운임($)","보험료($)","총과세가격($)","과세가격(₩)","부가세(₩)","환율"\n';
  allData.forEach(r => {
    const d = r.detail || {};
    csv += `"${r.tmCode}","${r.project||''}","${r.customer||''}","${r.declNo}","${r.declDate}",${r.amt},"${d.faceNo||''}","${d.tradeCustomer||''}","${d.collectionType||''}","${d.customerManual||''}","${d.pjtName||''}","${d.model||''}","${d.hsCode||''}",${d.qty||''},${d.unitPrice||''},${d.amount||''},${d.freight||''},${d.insurance||''},${d.totalTaxable||''},${d.taxableKRW||''},${d.vat||''},${d.exchangeRate||''}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '수출입필증_관리.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

$('detail-modal').addEventListener('click', e => {
  if (e.target === $('detail-modal')) closeModal();
});

render();
</script>
</body>
