<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수출입통관 관리</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; font-size: 13px; background: #f5f6f8; color: #1a1a2e; }
.page-container { max-width: 1800px; margin: 0 auto; padding: 20px 24px; }
.breadcrumb { font-size: 12px; color: #9ca3af; margin-bottom: 6px; }
.breadcrumb span { color: #6b7280; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.page-title { font-size: 20px; font-weight: 700; color: #111827; }

.card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
.btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: background .15s; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-ghost { background: transparent; color: #6b7280; border: 1px solid #e5e7eb; }
.btn-ghost:hover { background: #f3f4f6; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-green { background: #16a34a; color: #fff; border: none; }
.btn-green:hover { background: #15803d; }

.form-input, .form-select { width: 100%; padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; color: #111827; background: #fff; outline: none; }
.form-input:focus, .form-select:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.1); }

.section-header { display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-bottom: 1px solid #f0f0f0; }
.section-number { width: 22px; height: 22px; border-radius: 50%; background: #2563eb; color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.section-number.g { background: #15803d; }
.section-title { font-size: 14px; font-weight: 700; color: #111827; }
.section-subtitle { font-size: 12px; color: #9ca3af; }

/* 기간 바 */
.period-bar { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 14px; padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
.period-label { font-size: 12px; font-weight: 600; color: #6b7280; flex-shrink: 0; }
.year-tabs { display: flex; gap: 4px; }
.year-tab { padding: 4px 13px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #e5e7eb; color: #6b7280; background: #fff; }
.year-tab.active { background: #1e40af; color: #fff; border-color: #1e40af; }
.qtr-btns { display: flex; gap: 4px; }
.qtr-btn { padding: 4px 11px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid #e5e7eb; color: #6b7280; background: #fff; }
.qtr-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }

/* KPI */
.kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.kpi-card { background: #fff; border-radius: 8px; padding: 14px 18px; box-shadow: 0 1px 4px rgba(0,0,0,.08); border-left: 4px solid #e5e7eb; }
.kpi-card.kpend { border-left-color: #dc2626; }
.kpi-card.kprog { border-left-color: #d97706; }
.kpi-card.kdone { border-left-color: #16a34a; }
.kpi-label { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
.kpi-value { font-size: 22px; font-weight: 700; color: #111827; line-height: 1.1; }
.kpi-sub { font-size: 11px; color: #9ca3af; margin-top: 3px; }

/* 검색 */
.filter-row { display: flex; gap: 10px; padding: 12px 20px; align-items: flex-end; flex-wrap: wrap; }
.filter-row .fg { flex: 1; min-width: 120px; }
.filter-row .fg label { display: block; font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 3px; }

/* 테이블 */
.tbl-wrap { overflow-x: auto; }
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
.tbl th { background: #f8f9fb; color: #6b7280; font-weight: 600; padding: 6px 10px; text-align: center; border-bottom: 1px solid #e5e7eb; border-right: 1px solid #f0f0f0; }
.tbl td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; border-right: 1px solid #f0f0f0; vertical-align: middle; text-align: center; }
.tbl .th-group { font-size: 11px; padding: 4px 10px; font-weight: 700; }

/* TM 그룹 헤더 */
.tm-header { cursor: pointer; }
.tm-header:hover td { background: #f0f5ff !important; }
.tm-inner { display: flex; align-items: center; padding: 10px 14px; gap: 12px; }
.tm-sep td { height: 5px; background: #e9ecf0; padding: 0; border: none; }
.item-row td:first-child { border-left: 4px solid #c7d2fe; }
.item-row:hover td { background: #fafbff !important; }

/* 배지 */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.b-done { background: #dcfce7; color: #15803d; }
.b-pending { background: #fee2e2; color: #b91c1c; }
.b-partial { background: #fef3c7; color: #92400e; }
.tag-fab { background: #dbeafe; color: #1d4ed8; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; }
.tag-ip  { background: #fef9c3; color: #854d0e; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; }

.ip-alert { display: inline-flex; align-items: center; gap: 4px; background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; animation: pulse-alert 2s ease-in-out infinite; }
@keyframes pulse-alert { 0%,100%{opacity:1;} 50%{opacity:.6;} }

.sum-strip { display: flex; align-items: center; gap: 18px; padding: 10px 20px; background: #f8f9fb; border-top: 1px solid #f0f0f0; border-radius: 0 0 8px 8px; flex-wrap: wrap; }
.sum-label { font-size: 12px; color: #6b7280; }
.sum-value { font-size: 13px; font-weight: 700; color: #111827; margin-left: 5px; }
.sum-divider { width: 1px; height: 16px; background: #e5e7eb; }

.expand-icon { color: #9ca3af; font-size: 10px; transition: transform .18s; display: inline-block; width: 14px; }
.expand-icon.open { transform: rotate(90deg); }
.hidden { display: none !important; }
.empty-row td { color: #9ca3af; padding: 40px; text-align: center; }

/* 수입신고 등록 인라인 */
.decl-form { background: #f0fdf4; border: 1px solid #86efac; border-radius: 6px; padding: 12px 16px; margin: 8px 20px; display: flex; align-items: flex-end; gap: 10px; flex-wrap: wrap; }
.decl-form .fg { display: flex; flex-direction: column; }
.decl-form label { font-size: 10px; font-weight: 600; color: #15803d; margin-bottom: 3px; }
.decl-form input { padding: 6px 8px; border: 1px solid #86efac; border-radius: 5px; font-size: 12px; outline: none; }
.decl-form input:focus { border-color: #16a34a; }

/* 신고 이력 칩 */
.decl-chip { display: inline-flex; align-items: center; gap: 8px; background: #f0fdf4; border: 1px solid #86efac; border-radius: 6px; padding: 6px 12px; font-size: 12px; margin: 4px 0; }
.decl-chip .dc-no { font-weight: 700; color: #15803d; font-family: monospace; }
.decl-chip .dc-date { color: #6b7280; }
.decl-chip .dc-del { color: #d1d5db; cursor: pointer; font-size: 14px; }
.decl-chip .dc-del:hover { color: #b91c1c; }

@media (max-width: 1200px) { .kpi-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="page-container">
  <div class="breadcrumb">매입 관리 &gt; 수출입통관 &gt; <span>통관 관리</span></div>
  <div class="page-header">
    <h1 class="page-title">수출입통관 관리</h1>
  </div>

  <!-- 기간 -->
  <div class="period-bar">
    <span class="period-label">조회 기간</span>
    <div class="year-tabs" id="year-tabs"></div>
    <div style="width:1px;height:22px;background:#e5e7eb;"></div>
    <div class="qtr-btns" id="qtr-btns"></div>
  </div>

  <!-- KPI -->
  <div class="kpi-grid" id="kpi-grid"></div>

  <!-- 검색 -->

    <div class="section-header">
      <div class="section-number">1</div>
      <span class="section-title">검색 조건</span>
    </div>
    <div class="filter-row">
      <div class="fg"><label>TM Code</label><input id="f-tm" type="text" class="form-input" placeholder="TMCODE..."></div>
      <div class="fg"><label>과제명</label><input id="f-project" type="text" class="form-input" placeholder="과제명"></div>
      <div class="fg"><label>고객사</label><input id="f-customer" type="text" class="form-input" placeholder="고객사"></div>
      <div class="fg"><label>AL Code</label><input id="f-al" type="text" class="form-input" placeholder="CC..."></div>
      <div class="fg"><label>통관 상태</label>
        <select id="f-status" class="form-select">
          <option value="">전체</option>
          <option value="pending">미신고</option>

      <div style="display:flex;gap:6px;align-items:flex-end;padding-bottom:1px;">
        <button class="btn btn-ghost btn-sm" onclick="resetFilters()">↺ 초기화</button>

  <!-- 통관 현황 테이블 -->

    <div class="section-header">
      <div class="section-number">2</div>
      <span class="section-title">TM Code별 통관 현황</span>
      <span id="result-count" class="section-subtitle" style="margin-left:4px;"></span>
      <span style="margin-left:8px;font-size:11px;color:#9ca3af;">매입청구목록 데이터 기반 · TM Code 그룹핑</span>
      <div style="margin-left:auto;display:flex;gap:6px;">
        <button class="btn btn-ghost btn-sm" onclick="toggleAllTm(true)">모두 펼치기</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleAllTm(false)">접기</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th colspan="9" class="th-group" style="background:#eef2ff;color:#3730a3;">매입청구 정보 (Invoice 라인)</th>
            <th colspan="2" class="th-group" style="background:#f0fdf4;color:#15803d;">수입신고</th>
          </tr>
          <tr>
            <th style="width:22px;"></th>
            <th style="min-width:50px;">단계</th>
            <th style="min-width:60px;">외주처</th>
            <th style="min-width:130px;font-size:11px;">Invoice No.</th>
            <th style="min-width:78px;">Invoice일</th>
            <th style="min-width:180px;text-align:left;">ITEM</th>
            <th style="min-width:85px;">Unit Price($)</th>
            <th style="min-width:40px;">Qty</th>
            <th style="min-width:105px;">Invoice Amt($)</th>
            <th style="min-width:140px;background:#f0fdf4;">수입신고번호</th>
            <th style="min-width:80px;background:#f0fdf4;">신고일</th>
          </tr>
        </thead>
        <tbody id="main-body"></tbody>
      </table>
    </div>
    <div class="sum-strip" id="main-sum"></div>
  </div>

</div>

<script>
// ─── 매입청구목록 DATA (원본 그대로) ─────────────────────────────────────────
const CLAIM_DATA = [

      { item:'8" Wafer (2차)', unitPrice:625, qty:25, amount:15625, remark:'',

    details:[

    details:[
      { item:'12" Wafer (25매)', unitPrice:3513.30, qty:25, amount:87832.50, remark:'Contact Hold 포함',

  { id:'inv-06', vendor:'TSMC', invoiceDate:'2026-05-12', invoiceNo:'0K6426050F15',
    customer:'Telechips', project:'TNR300', tmCode:'TMCODE_43', alCode:'CC21543',
    details:[
      { item:'IP MERGE SERVICE', unitPrice:3500, qty:1, amount:3500, remark:'',
        poNo:'AL-MPW-20260316-22', process:'12nm' },
    ] },
  { id:'inv-07', vendor:'TSMC', invoiceDate:'2026-05-18', invoiceNo:'0K6426050KXS',
    customer:'Fadu', project:'Falcon_N2A-P', tmCode:'TMCODE_49', alCode:'CC21549',
    details:[
      { item:'12" Wafer (probe card)', unitPrice:801, qty:2, amount:1602, remark:'',
        poNo:'AL-NTO-20260409-22', process:'12nm' },
    ] },
  { id:'inv-08', vendor:'TSMC', invoiceDate:'2026-05-19', invoiceNo:'0K6426050O8P',
    customer:'Chipone', project:'LEO_C2', tmCode:'TMCODE_52', alCode:'CC21552',
    details:[
      { item:'Block fee', unitPrice:32422, qty:1.22, amount:39554.84, remark:'',
        poNo:'AL-MPW-20260114-23', process:'12nm' },
      { item:'EXTRA WAFER', unitPrice:6420, qty:1, amount:6420, remark:'',
        poNo:'AL-MPW-20260114-23', process:'12nm' },
    ] },
  { id:'inv-09', vendor:'TSMC', invoiceDate:'2026-05-21', invoiceNo:'0K6426050PX0',
    customer:'the-aio', project:'Pegasus_N1C', tmCode:'TMCODE_50', alCode:'CC21550',
    details:[
      { item:'LOT Charge', unitPrice:34358.02, qty:1, amount:34358.02, remark:'',
        poNo:'AL-NTO-260401-31', process:'12nm' },
    ] },
  { id:'inv-10', vendor:'TSMC', invoiceDate:'2026-05-21', invoiceNo:'0K6426050PX3',
    customer:'the-aio', project:'Pegasus_N1C', tmCode:'TMCODE_50', alCode:'CC21550',
    details:[
      { item:'12" Wafer (25매)', unitPrice:3578.96, qty:25, amount:89474, remark:'PO 50매 중 2차',
        poNo:'AL-MP-260108-32', process:'12nm' },
    ] },
  { id:'inv-11', vendor:'TSMC', invoiceDate:'2026-05-22', invoiceNo:'0K6426050RKW',
    customer:'Nexell', project:'VS776Q_C2', tmCode:'TMCODE_51', alCode:'CC21551',
    details:[
      { item:'TMUV07_C51 reorder (7매)', unitPrice:13787, qty:7, amount:96509, remark:'',
        poNo:'AL-MPW-20260312-11', process:'12nm' },
    ] },

// IP 항목 (매입청구목록에 향후 포함될 데이터)
const IP_DATA = [
  { id:'ip-01', vendor:'Synopsys', invoiceDate:'2026-03-15', invoiceNo:'SYN-2026-0315',
    customer:'the-aio', project:'Pegasus_N1B', tmCode:'TMCODE_41', alCode:'CC21541',
    details:[{ item:'DesignWare USB IP', unitPrice:28000, qty:1, amount:28000, remark:'해외 IP', poNo:'', process:'' }] },
  { id:'ip-02', vendor:'Cadence', invoiceDate:'2026-05-10', invoiceNo:'CDN-2026-0510',
    customer:'the-aio', project:'Pegasus_N1C', tmCode:'TMCODE_50', alCode:'CC21550',
    details:[{ item:'PCIe Gen5 PHY IP', unitPrice:45000, qty:1, amount:45000, remark:'해외 IP', poNo:'', process:'' }] },
  { id:'ip-03', vendor:'ARM', invoiceDate:'2026-02-10', invoiceNo:'ARM-2026-0210',
    customer:'Anapass', project:'ANA38413_N1C', tmCode:'TMCODE_36', alCode:'CC21536',
    details:[{ item:'Cortex-M33 CPU IP', unitPrice:32000, qty:1, amount:32000, remark:'해외 IP', poNo:'', process:'' }] },
  { id:'ip-04', vendor:'Rambus', invoiceDate:'2026-04-05', invoiceNo:'RMB-2026-0405',
    customer:'Melfas', project:'MF62', tmCode:'TMCODE_39', alCode:'CC21539',
    details:[{ item:'LPDDR5 PHY IP', unitPrice:18000, qty:1, amount:18000, remark:'해외 IP', poNo:'', process:'' }] },
  { id:'ip-05', vendor:'Synopsys', invoiceDate:'2026-01-20', invoiceNo:'SYN-MS-0120',
    customer:'Fadu', project:'Falcon_N2A-P', tmCode:'TMCODE_49', alCode:'CC21549',
    details:[{ item:'DesignWare M&S Annual Fee', unitPrice:5000, qty:1, amount:5000, remark:'M&S', poNo:'', process:'' }] },
  { id:'ip-06', vendor:'SMIC IP', invoiceDate:'2026-05-30', invoiceNo:'SMIC-ROY-0530',
    customer:'Chipone', project:'LEO_C2', tmCode:'TMCODE_52', alCode:'CC21552',
    details:[{ item:'SRAM Compiler Royalty', unitPrice:8200, qty:1, amount:8200, remark:'Royalty', poNo:'', process:'' }] },
];

// ─── 수입신고 상태 (TM Code별) ───────────────────────────────────────────────
// declarations[tmCode] = [{declNo, declDate}]
let declarations = {
  'TMCODE_36': [{declNo:'12345-26-0012345', declDate:'2026-05-25'}],
};

// ─── 상태 ─────────────────────────────────────────────────────────────────────
const YEARS=[2025,2026], CUR_YEAR=2026;
let selYear=2026, selQtr=0;
let tmCollapsed = new Set();

const $=id=>document.getElementById(id);
const fmtUsd=n=>'$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

function inPeriod(d){
  if(!d) return false;
  const y=parseInt(d.slice(0,4));
  if(y!==selYear) return false;
  if(selQtr===0) return true;
  return Math.ceil(parseInt(d.slice(5,7))/3)===selQtr;
}

// ─── TM Code 그룹핑 ─────────────────────────────────────────────────────────
function buildGroups(){
  const allItems = [...CLAIM_DATA, ...IP_DATA];
  const map = new Map();

  allItems.forEach(inv=>{
    inv.details.forEach(d=>{
      if(!inPeriod(inv.invoiceDate)) return;
      const tm = inv.tmCode;
      if(!map.has(tm)) map.set(tm, {
        tmCode:tm, project:inv.project, customer:inv.customer, alCode:inv.alCode,
        fabItems:[], ipItems:[], allRows:[]
      });
      const g = map.get(tm);
      const isFab = inv.vendor==='TSMC';
      const row = {
        id: inv.id+'_'+d.item,
        stage: isFab?'FAB':'IP',
        vendor: inv.vendor,
        invoiceNo: inv.invoiceNo,
        invoiceDate: inv.invoiceDate,
        item: d.item,
        unitPrice: d.unitPrice,
        qty: d.qty,
        amount: d.amount,
        remark: d.remark||'',
        poNo: d.poNo||'',
      };
      if(isFab) g.fabItems.push(row); else g.ipItems.push(row);
      g.allRows.push(row);
    });
  });

  return [...map.values()];
}

function getTmStatus(tmCode){
  const decls = declarations[tmCode] || [];
  return decls.length > 0 ? 'done' : 'pending';
}

// ─── 기간 바 ──────────────────────────────────────────────────────────────────
function renderPeriodBar(){
  $('year-tabs').innerHTML=YEARS.map(y=>`<div class="year-tab${y===selYear?' active':''}" onclick="setYear(${y})">${y}</div>`).join('');
  $('qtr-btns').innerHTML=[['전체',0],['Q1',1],['Q2',2],['Q3',3],['Q4',4]].map(([l,q])=>`<div class="qtr-btn${selQtr===q?' active':''}" onclick="setQtr(${q})">${l}</div>`).join('');
}
function setYear(y){selYear=y;selQtr=0;renderPeriodBar();render();}
function setQtr(q){selQtr=q;renderPeriodBar();render();}

// ─── KPI ─────────────────────────────────────────────────────────────────────
function renderKPI(groups){
  let pending=0, done=0, pendAmt=0;
  groups.forEach(g=>{
    const st=getTmStatus(g.tmCode);
    const amt=g.allRows.reduce((s,r)=>s+r.amount,0);
    if(st==='done') done++; else { pending++; pendAmt+=amt; }
  });
  $('kpi-grid').innerHTML=[
    {cls:'kpend',label:'미신고 TM',val:pending,sub:`${fmtUsd(pendAmt)} 미신고`},
    {cls:'kdone',label:'신고완료 TM',val:done,sub:'수입신고 완료'},
    {cls:'kprog',label:'전체 TM',val:pending+done,sub:`이번 기간 총 ${pending+done}건`},
  ].map(k=>`<div class="kpi-card ${k.cls}"><div class="kpi-label">${k.label}</div><div class="kpi-value">${k.val}<span style="font-size:12px;font-weight:500;color:#6b7280;"> 건</span></div><div class="kpi-sub">${k.sub}</div></div>`).join('');
}

// ─── 메인 렌더 ───────────────────────────────────────────────────────────────
function render(){
  let groups = buildGroups();

  // 필터
  const fTm=$('f-tm').value.trim().toLowerCase();
  const fPj=$('f-project').value.trim().toLowerCase();
  const fCu=$('f-customer').value.trim().toLowerCase();
  const fAl=$('f-al').value.trim().toLowerCase();
  const fSt=$('f-status').value;

  if(fTm) groups=groups.filter(g=>g.tmCode.toLowerCase().includes(fTm));
  if(fPj) groups=groups.filter(g=>g.project.toLowerCase().includes(fPj));
  if(fCu) groups=groups.filter(g=>g.customer.toLowerCase().includes(fCu));
  if(fAl) groups=groups.filter(g=>g.alCode.toLowerCase().includes(fAl));
  if(fSt) groups=groups.filter(g=>getTmStatus(g.tmCode)===fSt);

  renderKPI(buildGroups());

  if(!groups.length){
    $('main-body').innerHTML=`<tr class="empty-row"><td colspan="100">해당 기간 통관 대상이 없습니다.</td></tr>`;
    $('main-sum').innerHTML=''; $('result-count').textContent=''; return;
  }

  let html='', totalAmt=0, totalRows=0;

  groups.forEach((g,gi)=>{
    const st = getTmStatus(g.tmCode);
    const decls = declarations[g.tmCode]||[];
    const collapsed = tmCollapsed.has(g.tmCode);
    const groupAmt = g.allRows.reduce((s,r)=>s+r.amount,0);
    totalAmt+=groupAmt; totalRows+=g.allRows.length;

    const stBg = st==='done'?'#f0fdf4':'#fff5f5';
    const stBorder = st==='done'?'#86efac':'#fca5a5';
    const stBadge = st==='done'?'<span class="badge b-done">신고완료</span>':'<span class="badge b-pending">미신고</span>';

    const fabCnt=g.fabItems.length, ipCnt=g.ipItems.length;
    let alerts='';
    if(fabCnt>0&&ipCnt>0&&st==='pending') alerts=`<span class="ip-alert">IP ${ipCnt}건 포함</span>`;

    if(gi>0) html+=`<tr class="tm-sep"><td colspan="100"></td></tr>`;

    // TM 그룹 헤더
    html+=`<tr class="tm-header" onclick="toggleTm('${g.tmCode}')" style="background:${stBg};">
      <td colspan="100" style="padding:0;border-left:4px solid ${stBorder};">
        <div class="tm-inner">
          <span class="expand-icon${collapsed?'':' open'}">▶</span>
          <span style="background:#f5f3ff;color:#6d28d9;padding:3px 10px;border-radius:5px;font-size:12px;font-weight:700;font-family:monospace;">${g.tmCode}</span>
          <span style="font-size:14px;font-weight:700;color:#111827;">${g.project}</span>
          <span style="font-size:12px;color:#6b7280;">${g.customer}</span>
          <span style="background:#f3f4f6;color:#6b7280;padding:1px 6px;border-radius:3px;font-size:11px;">${g.alCode}</span>
          <span style="font-size:11px;color:#9ca3af;">${fabCnt>0?`FAB ${fabCnt}건`:''}${fabCnt>0&&ipCnt>0?' · ':''}${ipCnt>0?`IP ${ipCnt}건`:''}</span>
          ${alerts}
          <div style="margin-left:auto;display:flex;align-items:center;gap:16px;">
            <div style="text-align:right;">
              <div style="font-size:10px;color:#9ca3af;">Invoice 합계</div>
              <div style="font-size:13px;font-weight:700;color:#1d4ed8;">${fmtUsd(groupAmt)}</div>
            </div>
            ${stBadge}
            ${st==='pending'?`<button class="btn btn-green btn-sm" onclick="event.stopPropagation();showDeclForm('${g.tmCode}')">수입신고 등록</button>`:''}
          </div>
        </div>
        ${decls.length>0?`<div style="padding:0 14px 8px 42px;display:flex;flex-wrap:wrap;gap:6px;">${decls.map((d,di)=>`<div class="decl-chip"><span class="dc-no">${d.declNo}</span><span class="dc-date">${d.declDate}</span><span class="dc-del" onclick="event.stopPropagation();removeDecl('${g.tmCode}',${di})">×</span></div>`).join('')}</div>`:''}
        <div class="decl-form hidden" id="df-${g.tmCode}" onclick="event.stopPropagation();">
          <div class="fg"><label>수입신고번호 *</label><input type="text" id="dn-${g.tmCode}" placeholder="12345-26-0012345"></div>
          <div class="fg"><label>신고일 *</label><input type="date" id="dd-${g.tmCode}"></div>
          <button class="btn btn-green btn-sm" onclick="addDecl('${g.tmCode}')">등록</button>
          <button class="btn btn-ghost btn-sm" onclick="hideDeclForm('${g.tmCode}')">취소</button>
        </div>
      </td>
    </tr>`;

    // 펼침 → Invoice 라인들
    if(!collapsed){
      g.allRows.forEach(row=>{
        const tagCls=row.stage==='FAB'?'tag-fab':'tag-ip';
        const decl = decls.length>0 ? decls[0] : null;
        html+=`<tr class="item-row" style="${row.stage==='IP'?'background:rgba(254,252,232,.15);':''}">
          <td></td>
          <td><span class="${tagCls}">${row.stage}</span></td>
          <td style="font-weight:600;font-size:11px;">${row.vendor}</td>
          <td style="font-family:monospace;font-size:10px;color:#374151;">${row.invoiceNo}</td>
          <td style="font-size:11px;color:#6b7280;">${row.invoiceDate}</td>
          <td style="text-align:left;font-size:12px;">${row.item}</td>
          <td style="text-align:right;font-size:11px;color:#374151;">${fmtUsd(row.unitPrice)}</td>
          <td>${typeof row.qty==='number'&&row.qty%1!==0?row.qty.toFixed(2):row.qty}</td>
          <td style="text-align:right;font-weight:700;color:#1d4ed8;">${fmtUsd(row.amount)}</td>
          <td style="background:rgba(240,253,244,.5);font-family:monospace;font-size:11px;color:#15803d;">${decl?decl.declNo:'<span style="color:#d1d5db;">—</span>'}</td>
          <td style="background:rgba(240,253,244,.5);font-size:11px;color:#6b7280;">${decl?decl.declDate:'—'}</td>
        </tr>`;
      });
    }
  });

  $('main-body').innerHTML=html;
  $('result-count').textContent=`— ${groups.length} TM / ${totalRows}건`;
  $('main-sum').innerHTML=`
    <div class="sum-label">TM Code 수 <span class="sum-value">${groups.length}건</span></div>
    <div class="sum-divider"></div>
    <div class="sum-label">Invoice 라인 <span class="sum-value">${totalRows}건</span></div>
    <div class="sum-divider"></div>
    <div class="sum-label">Invoice 합계 <span class="sum-value" style="color:#1d4ed8;">${fmtUsd(totalAmt)}</span></div>
  `;
}

// ─── 토글 ─────────────────────────────────────────────────────────────────────
function toggleTm(tm){tmCollapsed.has(tm)?tmCollapsed.delete(tm):tmCollapsed.add(tm);render();}
function toggleAllTm(expand){
  if(expand) tmCollapsed.clear();
  else buildGroups().forEach(g=>tmCollapsed.add(g.tmCode));
  render();
}

// ─── 수입신고 등록/삭제 ──────────────────────────────────────────────────────
function showDeclForm(tm){
  const el=$('df-'+tm);
  if(el){el.classList.remove('hidden');$('dd-'+tm).value=new Date().toISOString().slice(0,10);}
}
function hideDeclForm(tm){const el=$('df-'+tm);if(el)el.classList.add('hidden');}

function addDecl(tm){
  const no=($('dn-'+tm).value||'').trim();
  const date=($('dd-'+tm).value||'').trim();
  if(!no){alert('수입신고번호를 입력해주세요.');return;}
  if(!date){alert('신고일을 입력해주세요.');return;}
  if(!declarations[tm]) declarations[tm]=[];
  declarations[tm].push({declNo:no, declDate:date});
  render();
}

function removeDecl(tm,idx){
  if(!confirm('수입신고 기록을 삭제하시겠습니까?')) return;
  if(declarations[tm]) declarations[tm].splice(idx,1);
  if(declarations[tm]&&declarations[tm].length===0) delete declarations[tm];
  render();
}

// ─── 검색 초기화 ─────────────────────────────────────────────────────────────
function resetFilters(){
  ['f-tm','f-project','f-customer','f-al'].forEach(id=>$(id).value='');
  $('f-status').value='';
  render();
}
['f-tm','f-project','f-customer','f-al'].forEach(id=>$(id).addEventListener('input',render));
$('f-status').addEventListener('change',render);

// ─── 초기 실행 ───────────────────────────────────────────────────────────────
renderPeriodBar();
render();
</script>
</body>
</html>
