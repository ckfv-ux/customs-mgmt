<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수출입통관 관리</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; font-size: 13px; background: #f5f6f8; color: #1a1a2e; }
.page-container { max-width: 1800px; margin: 0 auto; padding: 20px 24px; }
.breadcrumb { font-size: 12px; color: #9ca3af; margin-bottom: 6px; }
.breadcrumb span { color: #6b7280; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.page-title { font-size: 20px; font-weight: 700; color: #111827; }

.card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
.btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: background .15s; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-ghost { background: transparent; color: #6b7280; border: 1px solid #e5e7eb; }
.btn-ghost:hover { background: #f3f4f6; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-green { background: #16a34a; color: #fff; border: none; }
.btn-green:hover { background: #15803d; }

.form-input, .form-select { width: 100%; padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; color: #111827; background: #fff; outline: none; }
.form-input:focus, .form-select:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.1); }

.section-header { display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-bottom: 1px solid #f0f0f0; }
.section-number { width: 22px; height: 22px; border-radius: 50%; background: #2563eb; color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.section-title { font-size: 14px; font-weight: 700; color: #111827; }
.section-subtitle { font-size: 12px; color: #9ca3af; }

/* 요약 메뉴 */
.summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
.summary-card { background: #fff; border-radius: 8px; padding: 14px 18px; box-shadow: 0 1px 4px rgba(0,0,0,.08); border-left: 4px solid #e5e7eb; cursor: pointer; transition: all .15s; }
.summary-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); }
.summary-card.on { outline: 2px solid #2563eb; }
.summary-card.s-pend { border-left-color: #dc2626; }
.summary-card.s-part { border-left-color: #d97706; }
.summary-card.s-ip   { border-left-color: #7c3aed; }
.summary-card.s-done { border-left-color: #16a34a; }
.s-label { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
.s-value { font-size: 22px; font-weight: 700; color: #111827; line-height: 1.1; }
.s-sub { font-size: 11px; color: #9ca3af; margin-top: 3px; }

/* 검색 */
.filter-row { display: flex; gap: 10px; padding: 12px 20px; align-items: flex-end; flex-wrap: wrap; }
.filter-row .fg { flex: 1; min-width: 110px; }
.filter-row .fg label { display: block; font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 3px; }

/* 테이블 */
.tbl-wrap { overflow-x: auto; }
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
.tbl th { background: #f8f9fb; color: #6b7280; font-weight: 600; padding: 6px 10px; text-align: center; border-bottom: 1px solid #e5e7eb; border-right: 1px solid #f0f0f0; }
.tbl td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; border-right: 1px solid #f0f0f0; vertical-align: middle; text-align: center; }
.tbl .th-group { font-size: 11px; padding: 4px 10px; font-weight: 700; }

/* TM 그룹 */
.tm-header { cursor: pointer; }
.tm-header:hover td { background: #f0f5ff !important; }
.tm-inner { display: flex; align-items: center; padding: 10px 14px; gap: 12px; flex-wrap: wrap; }
.tm-sep td { height: 5px; background: #e9ecf0; padding: 0; border: none; }
.item-row td:first-child { border-left: 4px solid #c7d2fe; }
.item-row:hover td { background: #fafbff !important; }

/* 배지 */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.b-done { background: #dcfce7; color: #15803d; }
.b-pending { background: #fee2e2; color: #b91c1c; }
.b-partial { background: #fef3c7; color: #92400e; }
.tag-fab { background: #dbeafe; color: #1d4ed8; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; }
.tag-ip  { background: #fef9c3; color: #854d0e; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; }

.ip-alert { display: inline-flex; align-items: center; gap: 4px; background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; animation: pulse-alert 2s ease-in-out infinite; }
@keyframes pulse-alert { 0%,100%{opacity:1;} 50%{opacity:.6;} }

.bar-wrap { width: 100%; height: 4px; background: #e5e7eb; border-radius: 2px; margin-top: 3px; }
.bar-fill { height: 4px; border-radius: 2px; }

.sum-strip { display: flex; align-items: center; gap: 18px; padding: 10px 20px; background: #f8f9fb; border-top: 1px solid #f0f0f0; border-radius: 0 0 8px 8px; flex-wrap: wrap; }
.sum-label { font-size: 12px; color: #6b7280; }
.sum-value { font-size: 13px; font-weight: 700; color: #111827; margin-left: 5px; }
.sum-divider { width: 1px; height: 16px; background: #e5e7eb; }

.expand-icon { color: #9ca3af; font-size: 10px; transition: transform .18s; display: inline-block; width: 14px; }
.expand-icon.open { transform: rotate(90deg); }
.hidden { display: none !important; }
.empty-row td { color: #9ca3af; padding: 40px; text-align: center; }

/* 통관완료 정보 입력 폼 */
.decl-form { background: #f0fdf4; border: 1px solid #86efac; border-radius: 6px; padding: 12px 16px; margin: 4px 14px 8px 42px; display: flex; align-items: flex-end; gap: 10px; flex-wrap: wrap; }
.decl-form .fg { display: flex; flex-direction: column; }
.decl-form label { font-size: 10px; font-weight: 600; color: #15803d; margin-bottom: 3px; }
.decl-form input { padding: 6px 8px; border: 1px solid #86efac; border-radius: 5px; font-size: 12px; outline: none; }
.decl-form input:focus { border-color: #16a34a; }

/* 통관 이력 표시 */
.cl-history { padding: 4px 14px 8px 42px; }
.cl-row { display: flex; align-items: center; gap: 12px; padding: 4px 10px; background: #f8fafc; border-radius: 4px; margin-bottom: 3px; font-size: 11px; }
.cl-row .cl-no { font-weight: 700; color: #15803d; font-family: monospace; }
.cl-row .cl-date { color: #6b7280; }
.cl-row .cl-amt { font-weight: 700; color: #1d4ed8; }
.cl-row .cl-del { color: #d1d5db; cursor: pointer; font-size: 14px; margin-left: auto; }
.cl-row .cl-del:hover { color: #b91c1c; }

/* 체크박스 */
.chk-col { width: 28px; text-align: center; }
.chk-col input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: #2563eb; }

/* 하단 액션 바 */
.action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; color: #fff; padding: 12px 28px; display: flex; align-items: center; gap: 16px; z-index: 999; box-shadow: 0 -4px 20px rgba(0,0,0,.25); transform: translateY(100%); transition: transform .25s ease; }
.action-bar.show { transform: translateY(0); }
.action-bar .sel-count { font-size: 14px; font-weight: 700; }
.action-bar .sel-amt { font-size: 13px; color: #94a3b8; margin-left: 8px; }
.btn-desel { background: transparent; color: #94a3b8; border: 1px solid #475569; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.btn-desel:hover { color: #fff; border-color: #94a3b8; }
.btn-action { background: #16a34a; color: #fff; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 700; border: none; cursor: pointer; margin-left: auto; }
.btn-action:hover { background: #15803d; }

/* 기간 바 */
.period-bar { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 14px; padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
.period-label { font-size: 12px; font-weight: 600; color: #6b7280; flex-shrink: 0; }
.year-tabs { display: flex; gap: 4px; }
.year-tab { padding: 4px 13px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #e5e7eb; color: #6b7280; background: #fff; }
.year-tab.active { background: #1e40af; color: #fff; border-color: #1e40af; }
.qtr-btns { display: flex; gap: 4px; }
.qtr-btn { padding: 4px 11px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid #e5e7eb; color: #6b7280; background: #fff; }
.qtr-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }

@media (max-width: 1400px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="page-container">
  <div class="breadcrumb">매입 관리 &gt; 수출입통관 &gt; <span>통관 관리</span></div>

    <h1 class="page-title">수출입통관 관리</h1>

    <div class="qtr-btns" id="qtr-btns"></div>

  <!-- 검색 조건 -->

    <div class="section-header">
      <div class="section-number">1</div>

    </div>

      <div class="fg"><label>과제명</label><input id="f-project" type="text" class="form-input" placeholder="과제명"></div>

      <div class="fg"><label>AL Code</label><input id="f-al" type="text" class="form-input" placeholder="CC..."></div>
      <div style="display:flex;gap:6px;align-items:flex-end;padding-bottom:1px;">
        <button class="btn btn-ghost btn-sm" onclick="resetFilters()">↺ 초기화</button>
        <button class="btn btn-primary btn-sm" onclick="render()">검색</button>
      </div>
    </div>
  </div>

  <!-- 요약 메뉴 -->
  <div class="summary-grid" id="summary-grid"></div>

  <!-- 하단 액션 바 -->
  <div class="action-bar" id="action-bar">
    <span class="sel-count" id="sel-count">0건 선택</span>
    <span class="sel-amt" id="sel-amt"></span>
    <button class="btn-desel" onclick="clearSelection()">선택 해제</button>
    <button class="btn-action" onclick="goToInvoicePage()">통관 Invoice 등록 →</button>
  </div>

  <!-- 통관 현황 테이블 -->
  <div class="card">
    <div class="section-header">
      <div class="section-number">2</div>
      <span class="section-title">TM Code별 통관 현황</span>
      <span id="result-count" class="section-subtitle" style="margin-left:4px;"></span>
      <div style="margin-left:auto;display:flex;gap:6px;">
        <button class="btn btn-ghost btn-sm" onclick="toggleAllTm(true)">모두 펼치기</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleAllTm(false)">접기</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th class="chk-col" rowspan="2" style="background:#f0fdf4;"><input type="checkbox" onclick="toggleSelectAll(this)"></th>
            <th colspan="9" class="th-group" style="background:#eef2ff;color:#3730a3;">매입청구 정보 (Invoice 라인)</th>
            <th colspan="2" class="th-group" style="background:#f0fdf4;color:#15803d;">통관 현황</th>
          </tr>
          <tr>
            <th style="width:22px;"></th>
            <th style="min-width:50px;">단계</th>
            <th style="min-width:60px;">외주처</th>
            <th style="min-width:130px;font-size:11px;">Invoice No.</th>
            <th style="min-width:78px;">Invoice일</th>
            <th style="min-width:180px;text-align:left;">ITEM</th>
            <th style="min-width:85px;">Unit Price($)</th>

            <th style="min-width:80px;background:#f0fdf4;">신고일</th>
          </tr>
        </thead>
        <tbody id="main-body"></tbody>
      </table>
    </div>
    <div class="sum-strip" id="main-sum"></div>
  </div>
</div>

// ─── 통관 이력: TM Code 레벨 금액 누적 ───────────────────────────────────────
// clearances[tmCode] = [{invNo, amt, date, declNo, declDate}]
let clearances = {
  'TMCODE_36': [
    {invNo:'0K642605068Q', amt:264918.80, date:'2026-05-20', declNo:'12345-26-0012345', declDate:'2026-05-25'}
  ],
  'TMCODE_41': [
    {invNo:'0K64260509GB-1', amt:15290.28, date:'2026-05-22', declNo:'12345-26-0012380', declDate:'2026-05-28'}
  ],
  'TMCODE_39': [
    {invNo:'0K642605069K', amt:49250, date:'2026-05-28', declNo:'12345-26-0012400', declDate:'2026-06-01'}
  ],
};

// ─── 상태 ─────────────────────────────────────────────────────────────────────
const YEARS=[2025,2026], CUR_YEAR=2026;
let selYear=2026, selQtr=0;
let activeFilter = '';
let tmCollapsed = new Set();
let selectedRows = new Set();

const $=id=>document.getElementById(id);
const fmtUsd=n=>'$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtQ=n=>Number(n||0)%1===0?String(Number(n||0)):Number(n).toFixed(2);

function inPeriod(d){
  if(!d) return false;
  const y=parseInt(d.slice(0,4));
  if(y!==selYear) return false;
  if(selQtr===0) return true;
  return Math.ceil(parseInt(d.slice(5,7))/3)===selQtr;
}

function renderPeriodBar(){
  $('year-tabs').innerHTML=YEARS.map(y=>`<div class="year-tab${y===selYear?' active':''}" onclick="setYear(${y})">${y}</div>`).join('');
  $('qtr-btns').innerHTML=[['전체',0],['Q1',1],['Q2',2],['Q3',3],['Q4',4]].map(([l,q])=>`<div class="qtr-btn${selQtr===q?' active':''}" onclick="setQtr(${q})">${l}</div>`).join('');
}
function setYear(y){selYear=y;selQtr=0;activeFilter='';renderPeriodBar();render();}
function setQtr(q){selQtr=q;activeFilter='';renderPeriodBar();render();}

function buildGroups(){
  const all=[...CLAIM_DATA,...IP_DATA];
  const map=new Map();
  all.forEach(inv=>{
    inv.details.forEach((d,di)=>{
      if(!inPeriod(inv.invoiceDate)) return;
      const tm=inv.tmCode;
      if(!map.has(tm)) map.set(tm,{tmCode:tm,project:inv.project,customer:inv.customer,alCode:inv.alCode,fabItems:[],ipItems:[],allRows:[]});
      const g=map.get(tm);
      const isFab=inv.vendor==='TSMC';
      const rowId=inv.id+'_'+di;
      const row={id:rowId,stage:isFab?'FAB':'IP',vendor:inv.vendor,invoiceNo:inv.invoiceNo,invoiceDate:inv.invoiceDate,item:d.item,unitPrice:d.unitPrice,qty:d.qty,amount:d.amount,poNo:d.poNo||'',tmCode:tm,project:inv.project,customer:inv.customer,alCode:inv.alCode};
      if(isFab) g.fabItems.push(row); else g.ipItems.push(row);
      g.allRows.push(row);
    });
  });
  return[...map.values()];
}

function tmCleared(tm){
  return (clearances[tm]||[]).reduce((s,c)=>s+c.amt,0);
}

function tmTotal(g){
  return g.allRows.reduce((s,r)=>s+r.amount,0);
}

function tmStatus(g){
  const total=tmTotal(g);
  const cleared=tmCleared(g.tmCode);
  if(cleared<0.01) return 'pending';
  if(total-cleared>0.01) return 'partial';
  return 'done';
}

function tmRemaining(g){
  return Math.max(0, tmTotal(g) - tmCleared(g.tmCode));
}

// ─── 요약 메뉴 ───────────────────────────────────────────────────────────────
function renderSummary(groups){
  let pending=0, partial=0, ipOnly=0, done=0;
  let pendAmt=0, partRemain=0, ipAmt=0;

  groups.forEach(g=>{
    const st=tmStatus(g);
    if(st==='pending'){pending++;pendAmt+=tmTotal(g);}
    else if(st==='partial'){partial++;partRemain+=tmRemaining(g);}
    else{done++;}
  });

  groups.forEach(g=>{
    const st=tmStatus(g);
    if(st!=='done'){
      g.ipItems.forEach(r=>{ipAmt+=r.amount;});
      if(g.ipItems.length>0) ipOnly++;
    }
  });

  const cards=[
    {id:'pending',cls:'s-pend',label:'미통관 과제',val:pending,sub:`${fmtUsd(pendAmt)} 미신고`},
    {id:'partial',cls:'s-part',label:'부분통관 과제',val:partial,sub:`잔여 ${fmtUsd(partRemain)}`},
    {id:'ip',cls:'s-ip',label:'TSMC외 IP 잔여',val:ipOnly,sub:`${fmtUsd(ipAmt)} IP 포함`},
    {id:'done',cls:'s-done',label:'전체완료 과제',val:done,sub:'통관 완료'},
  ];

  $('summary-grid').innerHTML=cards.map(k=>
    `<div class="summary-card ${k.cls}${activeFilter===k.id?' on':''}" onclick="clickSummary('${k.id}')">
      <div class="s-label">${k.label}</div>
      <div class="s-value">${k.val}<span style="font-size:12px;font-weight:500;color:#6b7280;"> 건</span></div>
      <div class="s-sub">${k.sub}</div>
    </div>`
  ).join('');
}

function clickSummary(id){activeFilter=activeFilter===id?'':id;render();}

// ─── 메인 렌더 ───────────────────────────────────────────────────────────────
function render(){
  let groups=buildGroups();
  const allGroups=[...groups];

  const fTm=$('f-tm').value.trim().toLowerCase();
  const fPj=$('f-project').value.trim().toLowerCase();
  const fCu=$('f-customer').value.trim().toLowerCase();
  const fAl=$('f-al').value.trim().toLowerCase();
  if(fTm) groups=groups.filter(g=>g.tmCode.toLowerCase().includes(fTm));
  if(fPj) groups=groups.filter(g=>g.project.toLowerCase().includes(fPj));
  if(fCu) groups=groups.filter(g=>g.customer.toLowerCase().includes(fCu));
  if(fAl) groups=groups.filter(g=>g.alCode.toLowerCase().includes(fAl));

  if(activeFilter==='pending') groups=groups.filter(g=>tmStatus(g)==='pending');
  else if(activeFilter==='partial') groups=groups.filter(g=>tmStatus(g)==='partial');
  else if(activeFilter==='ip') groups=groups.filter(g=>tmStatus(g)!=='done'&&g.ipItems.length>0);
  else if(activeFilter==='done') groups=groups.filter(g=>tmStatus(g)==='done');

  renderSummary(allGroups);

  if(!groups.length){
    $('main-body').innerHTML=`<tr class="empty-row"><td colspan="100">해당 조건에 맞는 과제가 없습니다.</td></tr>`;
    $('main-sum').innerHTML='';$('result-count').textContent='';return;
  }

  const ipOnlyMode=activeFilter==='ip';
  let html='',totalAmt=0,totalRows=0;

  groups.forEach((g,gi)=>{
    const st=tmStatus(g);
    const total=tmTotal(g);
    const cleared=tmCleared(g.tmCode);
    const remaining=tmRemaining(g);
    const cls=clearances[g.tmCode]||[];
    const collapsed=tmCollapsed.has(g.tmCode);
    const displayRows=ipOnlyMode?g.ipItems:g.allRows;
    const groupAmt=displayRows.reduce((s,r)=>s+r.amount,0);
    totalAmt+=groupAmt;totalRows+=displayRows.length;

    const pct=total>0?Math.min(100,(cleared/total)*100):0;
    const stBg={pending:'#fff5f5',partial:'#fffef0',done:'#f0fdf4'}[st];
    const stBorder={pending:'#fca5a5',partial:'#fde68a',done:'#86efac'}[st];
    const stBadge={pending:'<span class="badge b-pending">미통관</span>',partial:'<span class="badge b-partial">부분통관</span>',done:'<span class="badge b-done">통관완료</span>'}[st];
    const barColor={pending:'#e5e7eb',partial:'#f59e0b',done:'#16a34a'}[st];

    const fCnt=g.fabItems.length, iCnt=g.ipItems.length;
    let alerts='';
    if(iCnt>0&&st!=='done') alerts=`<span class="ip-alert">⚠ IP ${iCnt}건 포함</span>`;

    if(gi>0) html+=`<tr class="tm-sep"><td colspan="100"></td></tr>`;

    html+=`<tr class="tm-header" onclick="toggleTm('${g.tmCode}')" style="background:${stBg};">
      <td colspan="100" style="padding:0;border-left:4px solid ${stBorder};">
        <div class="tm-inner">
          <span class="expand-icon${collapsed?'':' open'}">▶</span>
          <span style="background:#f5f3ff;color:#6d28d9;padding:3px 10px;border-radius:5px;font-size:12px;font-weight:700;font-family:monospace;">${g.tmCode}</span>
          <span style="font-size:14px;font-weight:700;color:#111827;">${g.project}</span>
          <span style="font-size:12px;color:#6b7280;">${g.customer}</span>
          <span style="background:#f3f4f6;color:#6b7280;padding:1px 6px;border-radius:3px;font-size:11px;">${g.alCode}</span>
          <span style="font-size:11px;color:#9ca3af;">${fCnt>0?`FAB ${fCnt}건`:''}${fCnt>0&&iCnt>0?' · ':''}${iCnt>0?`IP ${iCnt}건`:''}</span>
          ${alerts}
          <div style="margin-left:auto;display:flex;align-items:center;gap:16px;">
            <div style="text-align:right;">
              <div style="font-size:10px;color:#9ca3af;">Invoice 합계</div>
              <div style="font-size:13px;font-weight:700;color:#1d4ed8;">${fmtUsd(total)}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:10px;color:#9ca3af;">통관완료</div>
              <div style="font-size:13px;font-weight:700;color:#15803d;">${cleared>0.01?fmtUsd(cleared):'—'}</div>
            </div>
            <div style="text-align:right;min-width:90px;">
              <div style="font-size:10px;color:#9ca3af;">잔여</div>
              <div style="font-size:13px;font-weight:700;color:${remaining>0.01?'#d97706':'#15803d'};">${remaining>0.01?fmtUsd(remaining):'완료'}</div>
              <div class="bar-wrap" style="width:80px;"><div class="bar-fill" style="width:${pct}%;background:${barColor};"></div></div>
            </div>
            ${stBadge}
            ${st!=='done'?`<button class="btn btn-green btn-sm" onclick="event.stopPropagation();showDeclForm('${g.tmCode}')">통관완료 정보 입력</button>`:''}
          </div>
        </div>
        <div class="decl-form hidden" id="df-${g.tmCode}" onclick="event.stopPropagation();">
          <div class="fg"><label>수입신고번호 *</label><input type="text" id="dn-${g.tmCode}" placeholder="12345-26-0012345"></div>
          <div class="fg"><label>신고일 *</label><input type="date" id="dd-${g.tmCode}"></div>
          <div class="fg"><label>통관금액($) *</label><input type="number" id="da-${g.tmCode}" step="0.01" placeholder="${remaining>0.01?remaining.toFixed(2):''}"></div>
          <div class="fg"><label>통관Invoice No.</label><input type="text" id="di-${g.tmCode}" placeholder="선택"></div>
          <button class="btn btn-green btn-sm" onclick="addDecl('${g.tmCode}')">등록</button>
          <button class="btn btn-ghost btn-sm" onclick="hideDeclForm('${g.tmCode}')">취소</button>
        </div>
      </td>
    </tr>`;

    if(!collapsed){
      displayRows.forEach(row=>{
        const tagCls=row.stage==='FAB'?'tag-fab':'tag-ip';
        const latestDecl=cls.length>0?cls[cls.length-1]:null;
        html+=`<tr class="item-row" style="${row.stage==='IP'?'background:rgba(254,252,232,.15);':''}">
          <td class="chk-col">${st!=='done'?`<input type="checkbox" ${selectedRows.has(row.id)?'checked':''} onchange="toggleSelect('${row.id}')">`:''}</td>
          <td></td>
          <td><span class="${tagCls}">${row.stage}</span></td>
          <td style="font-weight:600;font-size:11px;">${row.vendor}</td>
          <td style="font-family:monospace;font-size:10px;color:#374151;">${row.stage==='FAB'?row.invoiceNo:''}${row.stage==='FAB'&&row.amount===0?`<div style="margin-top:2px;background:#fef3c7;color:#b45309;border:1px dashed #f59e0b;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;font-family:sans-serif;display:inline-block;">custom invoice</div>`:''}</td>
          <td style="font-size:11px;color:#6b7280;">${row.stage==='FAB'?row.invoiceDate:''}</td>
          <td style="text-align:left;font-size:12px;">${row.item}${row.stage==='FAB'&&row.poNo?`<div style="font-size:9px;color:#9ca3af;font-family:monospace;margin-top:1px;">${row.poNo}</div>`:''}</td>
          <td style="text-align:right;font-size:11px;color:#374151;">${fmtUsd(row.unitPrice)}</td>
          <td>${fmtQ(row.qty)}</td>
          <td style="text-align:right;font-weight:700;color:#1d4ed8;">${fmtUsd(row.amount)}</td>
          <td style="background:rgba(240,253,244,.5);font-family:monospace;font-size:11px;color:${st==='done'?'#15803d':'#d1d5db'};">${st==='done'&&latestDecl?latestDecl.declNo:'—'}</td>
          <td style="background:rgba(240,253,244,.5);font-size:11px;color:#6b7280;">${st==='done'&&latestDecl?latestDecl.declDate:'—'}</td>
        </tr>`;
      });
    }
  });

  $('main-body').innerHTML=html;
  $('result-count').textContent=`— ${groups.length} TM / ${totalRows}건`;
  $('main-sum').innerHTML=`
    <div class="sum-label">TM Code <span class="sum-value">${groups.length}건</span></div><div class="sum-divider"></div>
    <div class="sum-label">Invoice 라인 <span class="sum-value">${totalRows}건</span></div><div class="sum-divider"></div>
    <div class="sum-label">Invoice 합계 <span class="sum-value" style="color:#1d4ed8;">${fmtUsd(totalAmt)}</span></div>`;
}

// ─── 토글 ─────────────────────────────────────────────────────────────────────
function toggleTm(tm){tmCollapsed.has(tm)?tmCollapsed.delete(tm):tmCollapsed.add(tm);render();}
function toggleAllTm(expand){
  if(expand) tmCollapsed.clear();
  else buildGroups().forEach(g=>tmCollapsed.add(g.tmCode));
  render();
}

// ─── 통관완료 정보 등록/삭제 ─────────────────────────────────────────────────
function showDeclForm(tm){
  const el=$('df-'+tm);
  if(el){
    el.classList.remove('hidden');
    $('dd-'+tm).value=new Date().toISOString().slice(0,10);
    const g=buildGroups().find(gg=>gg.tmCode===tm);
    if(g) $('da-'+tm).placeholder=tmRemaining(g).toFixed(2);
  }
}
function hideDeclForm(tm){const el=$('df-'+tm);if(el)el.classList.add('hidden');}

function addDecl(tm){
  const no=($('dn-'+tm).value||'').trim();
  const date=($('dd-'+tm).value||'').trim();
  const amt=parseFloat($('da-'+tm).value||0);
  const invNo=($('di-'+tm).value||'').trim();
  if(!no){alert('수입신고번호를 입력해주세요.');return;}
  if(!date){alert('신고일을 입력해주세요.');return;}
  if(!amt||amt<=0){alert('통관금액을 입력해주세요.');return;}
  if(!clearances[tm]) clearances[tm]=[];
  clearances[tm].push({invNo:invNo||no, amt, date, declNo:no, declDate:date});
  render();
}

function removeDecl(tm,idx){
  if(!confirm('통관 이력을 삭제하시겠습니까?'))return;
  if(clearances[tm]) clearances[tm].splice(idx,1);
  if(clearances[tm]&&clearances[tm].length===0) delete clearances[tm];
  render();
}

// ─── 검색 초기화 ─────────────────────────────────────────────────────────────
function resetFilters(){
  ['f-tm','f-project','f-customer','f-al'].forEach(id=>$(id).value='');
  activeFilter='';render();
}
['f-tm','f-project','f-customer','f-al'].forEach(id=>$(id).addEventListener('input',()=>{activeFilter='';render();}));

// ─── Excel 내보내기 ──────────────────────────────────────────────────────────
function exportMainExcel(){
  const groups=buildGroups();
  let csv='﻿';
  csv+=`"수출입통관 현황 — ${selYear}년${selQtr>0?' Q'+selQtr:''}"\n\n`;
  csv+='"TM Code","과제명","고객사","AL Code","상태","Invoice 합계($)","통관완료($)","잔여($)","단계","외주처","Invoice No.","Invoice일","ITEM","PO No.","Unit Price($)","Qty","Invoice Amt($)"\n';
  groups.forEach(g=>{
    const st=tmStatus(g);
    const total=tmTotal(g);
    const cleared=tmCleared(g.tmCode);
    const remaining=tmRemaining(g);
    const stLabel={pending:'미통관',partial:'부분통관',done:'통관완료'}[st];
    g.allRows.forEach((r,ri)=>{
      csv+=`"${g.tmCode}","${g.project}","${g.customer}","${g.alCode}","${stLabel}",${ri===0?total:''},${ri===0?cleared:''},${ri===0?remaining:''},"${r.stage}","${r.vendor}","${r.stage==='FAB'?r.invoiceNo:''}","${r.stage==='FAB'?r.invoiceDate:''}","${r.item}","${r.poNo}",${r.unitPrice},${r.qty},${r.amount}\n`;
    });
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`통관현황_${selYear}${selQtr>0?'_Q'+selQtr:''}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ─── 체크박스 선택 ───────────────────────────────────────────────────────────
function toggleSelect(id){
  if(selectedRows.has(id)) selectedRows.delete(id); else selectedRows.add(id);
  render(); updateActionBar();
}

function toggleSelectAll(el){
  const groups=buildGroups();
  if(el.checked){
    groups.forEach(g=>{if(tmStatus(g)!=='done') g.allRows.forEach(r=>selectedRows.add(r.id));});
  } else { selectedRows.clear(); }
  render(); updateActionBar();
}

function clearSelection(){ selectedRows.clear(); render(); updateActionBar(); }

function updateActionBar(){
  const bar=$('action-bar');
  if(selectedRows.size===0){ bar.classList.remove('show'); return; }
  bar.classList.add('show');
  let totalAmt=0;
  buildGroups().forEach(g=>g.allRows.forEach(r=>{ if(selectedRows.has(r.id)) totalAmt+=r.amount; }));
  $('sel-count').textContent=`${selectedRows.size}건 선택`;
  $('sel-amt').textContent=`합계: ${fmtUsd(totalAmt)}`;
}

function goToInvoicePage(){
  if(selectedRows.size===0){ alert('통관할 항목을 선택해주세요.'); return; }
  const items=[];
  buildGroups().forEach(g=>g.allRows.forEach(r=>{
    if(selectedRows.has(r.id)){
      items.push({id:r.id,stage:r.stage,vendor:r.vendor,invoiceNo:r.invoiceNo,invoiceDate:r.invoiceDate,
        item:r.item,unitPrice:r.unitPrice,qty:r.qty,amount:r.amount,poNo:r.poNo,
        tmCode:r.tmCode,project:r.project,customer:r.customer,alCode:r.alCode});
    }
  }));
  localStorage.setItem('customsInvoiceItems',JSON.stringify(items));
  window.location.href='통관등록.html';
}

renderPeriodBar();
render();
</script>
